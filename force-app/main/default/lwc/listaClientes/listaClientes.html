<template>

    <lightning-card title={titulo} icon-name="standard:account">

        <div class="slds-p-around_medium">
            <lightning-input
                label="Nome"
                class="slds-m-bottom_small"
                data-campo="nome"
                onchange={capturarCampo}>
            </lightning-input>

            <lightning-input
                label="Empresa"
                class="slds-m-bottom_small">
            </lightning-input>

            <lightning-input
                type="email"
                label="E-mail"
                class="slds-m-bottom_small">
            </lightning-input>

            <lightning-combobox
                label="Status"
                class="slds-m-bottom_medium">
            </lightning-combobox>
            
            <lightning-button
                label="Salvar"
                variant="brand"
            </lightning-button>

            <hr class="slds-m-vertical_medium">

            <template if:true={clientes.data}>

                <p>Total de registros: {clientes.data.length}</p>

                <template for:each={clientes.data} for:item="cliente">

                    <p key={cliente.Id}>
                        {cliente.Name}
                    </p>

                </template>

            </template>

        </div>

    </lightning-card>

</template>
